# Sigma multi-document bundle for Linux endpoints with OCI-focused agentic AI detections
# Custom field: "owasp top 10"
# Note: some seed rules are intended for thresholding/correlation in the backend.

title: Linux Agent Spawning Shell Interpreter
"owasp top 10": "ASI01 Agent Goal Hijack"
id: asi01-oci-linux-001
status: experimental
logsource:
  product: linux
  category: process_creation
detection:
selection_parent:
  ParentImage|endswith:
    - '/python'
    - '/python3'
    - '/node'
    - '/java'
    - '/usr/local/bin/python'
selection_child:
  Image|endswith:
    - '/bin/bash'
    - '/bin/sh'
    - '/bin/zsh'
    - '/usr/bin/fish'
condition: selection_parent and selection_child
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - ComputerName
level: high
tags:
  - attack.execution
  - ai.agent
  - owasp.asi01
  - cloud.oci
  - product.linux

